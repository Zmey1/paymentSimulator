services:
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: payments_user
      POSTGRES_PASSWORD: payments_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments_user -d payments"]
      interval: 5s
      timeout: 3s
      retries: 10

  payment-service:
    build: ./services/payment-service
    ports:
      - "8180:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payments
      SPRING_DATASOURCE_USERNAME: payments_user
      SPRING_DATASOURCE_PASSWORD: payments_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RAZORPAY_ENABLED: ${RAZORPAY_ENABLED:-false}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_MERCHANT_NAME: ${RAZORPAY_MERCHANT_NAME:-PayFlow Demo}
      RAZORPAY_DESCRIPTION: ${RAZORPAY_DESCRIPTION:-Sandbox Checkout}
      RAZORPAY_RECEIVER_NAME: ${RAZORPAY_RECEIVER_NAME:-Demo Merchant}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  fraud-detection-service:
    build: ./services/fraud-detection-service
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  payment-dashboard:
    build: ./payment-dashboard
    ports:
      - "3000:80"
    depends_on:
      - payment-service

  selenium:
    image: selenium/standalone-chrome:4.18.1
    ports:
      - "4444:4444"
    shm_size: '2g'

  integration-tests:
    build: ./tests
    depends_on:
      - payment-dashboard
      - selenium
    profiles:
      - test

volumes:
  postgres_data:
