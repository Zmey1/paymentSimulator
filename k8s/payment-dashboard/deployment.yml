apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-dashboard
  labels:
    app: payment-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-dashboard
  template:
    metadata:
      labels:
        app: payment-dashboard
    spec:
      containers:
        - name: payment-dashboard
          image: __ECR_REGISTRY__/payments-sim/payment-dashboard:__IMAGE_TAG__
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
