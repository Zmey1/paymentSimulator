---
- name: Install Java 21 and Maven
  apt:
    name:
      - openjdk-21-jdk
      - maven
    state: present
    update_cache: yes

- name: Remove stale Jenkins GPG keys
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/share/keyrings/jenkins-keyring.gpg
    - /etc/apt/keyrings/jenkins-keyring.asc

- name: Remove old Jenkins repo list if present
  file:
    path: /etc/apt/sources.list.d/jenkins.list
    state: absent

- name: Add Jenkins GPG key
  shell: |
    mkdir -p /etc/apt/keyrings
    curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key \
      | gpg --dearmor -o /etc/apt/keyrings/jenkins-keyring.gpg
    chmod a+r /etc/apt/keyrings/jenkins-keyring.gpg

- name: Add Jenkins repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/"
    state: present
    filename: jenkins

- name: Install Jenkins
  apt:
    name: jenkins
    state: present
    update_cache: yes

- name: Start and enable Jenkins
  systemd:
    name: jenkins
    state: started
    enabled: yes

- name: Install Jenkins plugins
  community.general.jenkins_plugin:
    name: "{{ item }}"
    state: present
    url: "http://localhost:8080"
  loop:
    - workflow-aggregator
    - credentials-binding
    - docker-workflow
    - kubernetes-cli
    - sonar
    - git
    - pipeline-stage-view
  ignore_errors: true

- name: Install kubectl
  shell: |
    curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
    rm kubectl
  args:
    creates: /usr/local/bin/kubectl

- name: Install AWS CLI
  shell: |
    curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
    apt-get install -y unzip
    unzip -o awscliv2.zip
    ./aws/install --update
    rm -rf awscliv2.zip aws/
  args:
    creates: /usr/local/bin/aws

- name: Install Helm
  shell: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
